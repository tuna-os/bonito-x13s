name: Build, Push, and Release

on:
  push:
    branches: [main, universal]
  pull_request:
    branches: [main, universal]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bonito
            base_image: ghcr.io/tuna-os/bonito:gnome
            image_ref: ghcr.io/tuna-os/bonito-x13s
            iso_name: bonito-x13s-latest.iso
            iso_label: Bonito-X13s-Live

          - name: debian
            base_image: ghcr.io/bootcrew/debian-bootc:latest
            image_ref: ghcr.io/tuna-os/debian-x13s
            iso_name: debian-x13s-latest.iso
            iso_label: Debian-X13s-Live

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Build X13s image (${{ matrix.name }})
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            -t ${{ matrix.image_ref }}:latest \
            -t ${{ matrix.image_ref }}:${{ github.sha }} \
            -f Containerfile .

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          sudo podman push ${{ matrix.image_ref }}:latest
          sudo podman push ${{ matrix.image_ref }}:${{ github.sha }}

      - name: Install ISO build dependencies
        if: github.event_name != 'pull_request'
        run: sudo apt-get update -q && sudo apt-get install -y -q squashfs-tools mtools dosfstools xorriso rclone

      - name: Build systemd-boot ISO
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p output
          sudo src/make-systemd-boot-iso.sh \
            ${{ matrix.image_ref }}:latest \
            output/${{ matrix.iso_name }} \
            "${{ matrix.iso_label }}"

      - name: Verify ISO contents
        if: github.event_name != 'pull_request'
        run: |
          MOUNT=$(mktemp -d)
          sudo mount -o loop,ro output/${{ matrix.iso_name }} "$MOUNT"
          echo "=== Loader config ==="
          cat "$MOUNT/loader/loader.conf" 2>/dev/null || echo "(none)"
          echo "=== Boot entry ==="
          cat "$MOUNT/loader/entries/bonito-x13s.conf" 2>/dev/null || echo "(none)"
          echo "=== Boot files ==="
          ls -lh "$MOUNT/boot/aarch64/" 2>/dev/null || echo "(none)"
          echo "=== Squashfs ==="
          ls -lh "$MOUNT/LiveOS/" 2>/dev/null || echo "(none)"
          echo "=== DTBs ==="
          find "$MOUNT" -name "*.dtb" 2>/dev/null
          sudo umount "$MOUNT"
          rmdir "$MOUNT"

      - name: Upload ISO to Cloudflare R2
        if: github.event_name != 'pull_request'
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          rclone copyto "output/${{ matrix.iso_name }}" \
            "r2:${{ secrets.R2_BUCKET }}/bonito-x13s/${{ matrix.iso_name }}" --progress

