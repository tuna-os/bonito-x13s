name: Build, Push, and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REF: ghcr.io/tuna-os/bonito-x13s

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Build base bootc image
        run: |
          podman build \
            -t ${{ env.IMAGE_REF }}:latest \
            -t ${{ env.IMAGE_REF }}:${{ github.sha }} \
            -f Containerfile .

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          podman push ${{ env.IMAGE_REF }}:latest
          podman push ${{ env.IMAGE_REF }}:${{ github.sha }}

  build-iso:
    runs-on: ubuntu-24.04-arm
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just and rclone
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | sudo bash -s -- --to /usr/local/bin
          sudo apt-get install -y rclone golang

      - name: Build base bootc image (for ISO pipeline)
        run: |
          sudo podman build \
            -t localhost/bonito-x13s:latest \
            -f Containerfile .

      - name: Build ISO installer image
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable \
            -t localhost/bonito-x13s-installer:latest \
            -f Containerfile.iso .

      - name: Clone bootc-isos
        run: git clone -b fix-drop-stale-images-replace https://github.com/tuna-os/bootc-isos.git bootc-isos

      - name: Build image-builder
        working-directory: bootc-isos
        run: sudo just build-image-builder

      - name: Build ISO
        working-directory: bootc-isos
        run: sudo just iso-in-container bonito-x13s

      - name: Post-process ISO (inject X13s DTB, add GRUB devicetree)
        run: |
          set -euo pipefail
          ISO=$(sudo ls bootc-isos/output/*.iso | head -1)
          echo "=== Input ISO: $ISO ($(sudo du -sh "$ISO" | cut -f1)) ==="

          sudo apt-get install -y -q xorriso

          # Extract DTB from the base container (already built locally)
          KERNEL=$(sudo podman run --rm localhost/bonito-x13s:latest \
            sh -c 'ls /usr/lib/modules/ | sort -V | tail -1')
          echo "Kernel: $KERNEL"
          DTB_SRC="/usr/lib/modules/${KERNEL}/dtb/qcom/sc8280xp-lenovo-thinkpad-x13s.dtb"

          if ! sudo podman run --rm localhost/bonito-x13s:latest test -f "$DTB_SRC"; then
            echo "ERROR: DTB not found at $DTB_SRC — searching container..."
            sudo podman run --rm localhost/bonito-x13s:latest \
              find /usr/lib/modules -name "*sc8280xp*" 2>/dev/null || true
            exit 1
          fi
          sudo podman run --rm localhost/bonito-x13s:latest cat "$DTB_SRC" > /tmp/x13s.dtb
          echo "DTB: $(ls -lh /tmp/x13s.dtb)"

          # Mount ISO to examine structure and extract grub.cfg
          MOUNT=$(mktemp -d)
          sudo mount -o loop,ro "$ISO" "$MOUNT"

          echo "=== ISO root layout ==="
          find "$MOUNT" -maxdepth 3

          echo "=== ISO root grub.cfg ==="
          cat "$MOUNT/EFI/BOOT/grub.cfg" 2>/dev/null || echo "(not found)"
          cp "$MOUNT/EFI/BOOT/grub.cfg" /tmp/grub-original.cfg 2>/dev/null || \
            { echo "ERROR: no grub.cfg on ISO root"; sudo umount "$MOUNT"; exit 1; }

          # Check what GRUB reads inside efiboot.img
          if [ -f "$MOUNT/images/efiboot.img" ]; then
            EFI_MOUNT=$(mktemp -d)
            sudo mount -o loop,ro "$MOUNT/images/efiboot.img" "$EFI_MOUNT"
            echo "=== efiboot.img layout ==="
            find "$EFI_MOUNT"
            echo "=== efiboot.img grub.cfg (stub that searches the ISO) ==="
            cat "$EFI_MOUNT/EFI/BOOT/grub.cfg" 2>/dev/null || echo "(no grub.cfg in efiboot.img)"
            sudo umount "$EFI_MOUNT"
            rmdir "$EFI_MOUNT"
          fi

          sudo umount "$MOUNT"
          rmdir "$MOUNT"

          # Patch grub.cfg: insert 'devicetree' command after each 'initrd' line.
          # GRUB's 'devicetree' command (unlike the kernel cmdline param) actually
          # loads the DTB from the ISO filesystem and passes it to the kernel.
          python3 - << 'PYEOF'
          import re, sys
          content = open('/tmp/grub-original.cfg').read()
          print("=== BEFORE ===")
          print(content)
          patched = re.sub(
              r'^(\s+)(initrd\s+\S+.*)$',
              lambda m: m.group(0) + '\n' + m.group(1) + 'devicetree /dtb/qcom/sc8280xp-lenovo-thinkpad-x13s.dtb',
              content,
              flags=re.MULTILINE
          )
          print("=== AFTER ===")
          print(patched)
          open('/tmp/grub-patched.cfg', 'w').write(patched)
          PYEOF

          # Create modified ISO:
          #   -boot_image any replay  — preserves El Torito boot catalog from input
          #   -update                 — replaces grub.cfg on ISO root
          #   -add (with -pathspecs)  — injects DTB into ISO root at /dtb/qcom/
          sudo xorriso \
            -indev "$ISO" \
            -outdev /tmp/bonito-x13s-latest.iso \
            -boot_image any replay \
            -update /tmp/grub-patched.cfg /EFI/BOOT/grub.cfg \
            -pathspecs on \
            -add /tmp/x13s.dtb=/dtb/qcom/sc8280xp-lenovo-thinkpad-x13s.dtb \
            --

          echo "=== Modified ISO: $(ls -lh /tmp/bonito-x13s-latest.iso) ==="
          sudo rm "$ISO"
          sudo mv /tmp/bonito-x13s-latest.iso "$(dirname "$ISO")/bonito-x13s-latest.iso"
          sudo ls -lh "$(dirname "$ISO")/"

      - name: Upload ISO to Cloudflare R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          iso=$(sudo ls bootc-isos/output/*.iso | head -1)
          # Rename to consistent name for download link
          sudo mv "$iso" "bootc-isos/output/bonito-x13s-latest.iso"
          rclone copyto "bootc-isos/output/bonito-x13s-latest.iso" "r2:${{ secrets.R2_BUCKET }}/bonito-x13s/bonito-x13s-latest.iso" --progress
